<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Salon Quest</title>
<style>
:root{
  --cream:#FFF8F0;--orange:#FF7A2F;--ol:#FFB088;--od:#E05A10;
  --green:#2ECC71;--gd:#27AE60;--red:#E74C3C;--gray:#888;--text:#333;
  --shadow:0 4px 16px rgba(0,0,0,0.12);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--cream);font-family:'Helvetica Neue',Arial,sans-serif;color:var(--text);min-height:100vh;overflow-x:hidden;}
#header{position:fixed;top:0;left:0;right:0;z-index:100;background:#fff;border-bottom:2px solid var(--ol);padding:8px 12px 6px;box-shadow:0 2px 8px rgba(0,0,0,.08);}
#progress-bar{display:flex;align-items:center;gap:4px;justify-content:center;margin-bottom:4px;}
.dot{width:28px;height:20px;border-radius:5px;background:#ddd;transition:background .3s;cursor:pointer;border:none;padding:0;}
.dot:active{opacity:.7;transform:scale(.9);}.dot.active{background:var(--orange);}.dot.done{background:var(--ol);}
#stage-label{text-align:center;font-size:11px;color:var(--gray);min-height:15px;}
#header-nav{display:flex;justify-content:space-between;align-items:center;margin-top:4px;}
.nav-btn{background:none;border:1.5px solid var(--ol);border-radius:20px;padding:4px 10px;font-size:11px;line-height:1.4;color:var(--od);cursor:pointer;min-width:56px;min-height:44px;text-align:center;}
.nav-btn:active{background:var(--ol);}
#lang-btn{font-size:18px;border:none;background:none;cursor:pointer;min-width:44px;min-height:44px;}
#main{margin-top:92px;margin-bottom:88px;}
.stage{display:none;min-height:calc(100vh - 180px);flex-direction:column;align-items:center;}
.stage.active{display:flex;}
#st0{background:linear-gradient(160deg,#FFF3E8,#FFE0C8);justify-content:center;padding:32px 20px;}
#st0 h1{font-size:26px;font-weight:bold;text-align:center;color:var(--od);margin:8px 0 4px;}
.hint-box{background:#fff;border-radius:12px;padding:10px 16px;margin:10px 0 24px;font-size:12px;color:var(--gray);text-align:center;line-height:1.7;border:1px solid var(--ol);}
.hint-box strong{color:var(--od);font-size:13px;}
.lang-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%;max-width:340px;}
.lang-card{background:#fff;border-radius:20px;padding:20px 10px;text-align:center;cursor:pointer;box-shadow:var(--shadow);border:3px solid transparent;transition:all .15s;}
.lang-card:active{transform:scale(.96);border-color:var(--orange);}
.flag{font-size:44px;display:block;}.lname{font-size:17px;font-weight:bold;margin-top:6px;}.lname-ja{font-size:11px;color:var(--gray);margin-top:2px;}
.stage-header{width:100%;text-align:center;padding:22px 20px 12px;background:linear-gradient(180deg,#fff,var(--cream));}
.stage-icon{font-size:48px;display:block;margin-bottom:4px;}
.stage-num{font-size:11px;color:var(--orange);font-weight:bold;letter-spacing:1px;}
.stage-title{font-size:22px;font-weight:bold;margin:4px 0 2px;}
.ja-sub{font-size:13px;font-weight:normal;color:var(--gray);display:block;margin-top:2px;}
.stage-body{width:100%;padding:16px 20px 0;max-width:480px;}
.q-card{background:#fff;border-radius:18px;padding:20px;box-shadow:var(--shadow);margin-bottom:14px;}
.q-main{font-size:20px;font-weight:bold;line-height:1.4;margin-bottom:2px;}
.q-kana{font-size:12px;color:var(--od);margin-bottom:2px;}
.q-ja{font-size:12px;color:var(--gray);margin-bottom:14px;}
.choice-grid{display:grid;gap:10px;}
.col2{grid-template-columns:1fr 1fr;}.col1{grid-template-columns:1fr;}
.cbtn{background:var(--cream);border:2.5px solid #ddd;border-radius:14px;padding:14px 10px;text-align:center;cursor:pointer;transition:all .15s;min-height:64px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;position:relative;}
.cbtn:active{transform:scale(.97);}
.cbtn.sel{background:#FFF0E6;border-color:var(--orange);}
.cbtn.sel::after{content:'✓';position:absolute;top:5px;right:9px;color:var(--orange);font-weight:bold;font-size:15px;}
.cbtn.ng-s{background:#FFF5F5;border-color:#FFCCCC;}
.cbtn.ng-s.sel{background:#FFE0E0;border-color:var(--red);}
.cbtn.ng-s.sel::after{color:var(--red);}
.cbtn.ng-s.sel .cl{color:var(--red);}
.ce{font-size:26px;}.cl{font-size:14px;font-weight:bold;color:var(--text);line-height:1.3;}
.ck{font-size:10px;color:var(--od);line-height:1.4;}.cj{font-size:10px;color:var(--gray);line-height:1.4;}
.cbtn.sel .cl{color:var(--od);}
.len-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:10px;}
.len-btn{background:#fff;border:2.5px solid #ddd;border-radius:12px;padding:10px 12px;font-size:13px;font-weight:bold;cursor:pointer;text-align:center;min-width:70px;transition:all .15s;line-height:1.4;}
.len-btn.sel{background:#FFF0E6;border-color:var(--orange);color:var(--od);}
.len-btn:active{transform:scale(.96);}
.price-disp{font-size:52px;font-weight:bold;color:var(--od);text-align:center;padding:8px 0;}
.time-disp{font-size:38px;font-weight:bold;text-align:center;padding:4px 0;}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:10px;}
.nk{background:#fff;border:2px solid #ddd;border-radius:14px;padding:14px;font-size:22px;font-weight:bold;cursor:pointer;text-align:center;transition:all .15s;}
.nk:active{background:var(--ol);}
.nk.del{background:#FFF5F5;border-color:#FFCCCC;font-size:18px;}
.nk.clr{background:#F5F5F5;font-size:16px;}
.time-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:8px;}
.sum-card{background:#fff;border-radius:18px;padding:16px;box-shadow:var(--shadow);margin-bottom:12px;}
.sum-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid #f0f0f0;}
.sum-row:last-child{border-bottom:none;}
.sum-ico{font-size:20px;width:28px;text-align:center;}
.sum-key{font-size:11px;color:var(--gray);min-width:76px;line-height:1.4;}
.sum-val{font-size:14px;font-weight:bold;flex:1;}
.sum-price{font-size:40px;font-weight:bold;color:var(--od);text-align:center;padding:6px 0;}
.sum-time{font-size:26px;font-weight:bold;text-align:center;}
.agree-btn{display:block;width:100%;background:var(--green);color:#fff;font-size:20px;font-weight:bold;padding:18px;border:none;border-radius:16px;cursor:pointer;box-shadow:0 4px 12px rgba(46,204,113,.35);transition:all .15s;text-align:center;margin-top:6px;}
.agree-btn:active{transform:scale(.98);background:var(--gd);}
.next-btn{display:block;width:calc(100% - 40px);max-width:440px;margin:16px auto 0;background:var(--orange);color:#fff;font-size:18px;font-weight:bold;line-height:1.5;padding:16px;border:none;border-radius:16px;cursor:pointer;box-shadow:0 4px 12px rgba(255,122,47,.35);transition:all .15s;text-align:center;}
.next-btn:active{transform:scale(.98);background:var(--od);}
.btn-sub{font-size:11px;font-weight:normal;opacity:.85;display:block;}
.ss-bar{display:flex;gap:6px;justify-content:center;margin-bottom:14px;}
.ss{width:8px;height:8px;border-radius:50%;background:#ddd;transition:background .3s;}
.ss.active{background:var(--orange);width:20px;border-radius:4px;}
.ss.done{background:var(--ol);}
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.cat-item{background:#f5f5f5;border-radius:12px;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:34px;cursor:pointer;border:3px solid transparent;transition:all .15s;position:relative;flex-direction:column;gap:2px;}
.cat-item.sel{border-color:var(--orange);background:#FFF0E6;}
.cat-item:active{transform:scale(.95);}
.cat-chk{display:none;position:absolute;top:3px;right:5px;font-size:14px;}
.cat-item.sel .cat-chk{display:block;}
.ph-card{background:#fff;border-radius:16px;padding:22px;text-align:center;box-shadow:var(--shadow);color:var(--gray);font-size:14px;line-height:1.8;margin-bottom:14px;}
.ph-card strong{color:var(--orange);font-size:16px;display:block;margin-bottom:8px;}
#sos-fab{position:fixed;bottom:24px;right:20px;z-index:200;width:68px;height:68px;border-radius:50%;background:var(--red);color:#fff;border:none;cursor:pointer;box-shadow:0 4px 16px rgba(231,76,60,.4);display:none;align-items:center;justify-content:center;flex-direction:column;line-height:1.3;}
#sos-fab:active{transform:scale(.93);}
.fab-e{font-size:26px;}.fab-l{font-size:10px;font-weight:bold;}
#sos-ov{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.55);align-items:flex-end;}
#sos-ov.open{display:flex;}
#sos-panel{background:#fff;width:100%;border-radius:24px 24px 0 0;padding:20px 16px 36px;box-shadow:0 -4px 20px rgba(0,0,0,.15);}
#sos-panel h3{font-size:16px;font-weight:bold;color:var(--red);text-align:center;margin-bottom:14px;}
.sos-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.sos-item{background:#FFF0F0;border:2px solid #FFCCCC;border-radius:14px;padding:12px 6px;text-align:center;cursor:pointer;transition:all .15s;}
.sos-item:active{background:#FFCCCC;}
.sos-e{font-size:28px;display:block;}.sos-c{font-size:12px;font-weight:bold;color:#c0392b;margin-top:3px;}
.sos-k{font-size:10px;color:var(--od);margin-top:1px;}
.sos-j{font-size:10px;color:var(--gray);border-top:1px solid #FFCCCC;padding-top:2px;margin-top:2px;}
#sos-close{display:block;margin:14px auto 0;background:var(--gray);color:#fff;border:none;border-radius:12px;padding:12px 32px;font-size:15px;cursor:pointer;}
#sos-alert{display:none;position:fixed;inset:0;z-index:400;background:rgba(231,76,60,.93);align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:36px;}
#sos-alert.open{display:flex;}
.al-e{font-size:80px;}.al-j{font-size:26px;font-weight:bold;color:#fff;margin:14px 0 6px;line-height:1.5;}
.al-en{font-size:15px;color:rgba(255,255,255,.8);}
#sos-ok{margin-top:28px;background:#fff;color:var(--red);border:none;border-radius:14px;padding:16px 36px;font-size:17px;font-weight:bold;cursor:pointer;}
#sc{display:none;position:fixed;inset:0;z-index:500;background:rgba(255,190,80,.92);align-items:center;justify-content:center;flex-direction:column;text-align:center;pointer-events:none;}
#sc.open{display:flex;}
.sc-e{font-size:64px;animation:bounce .4s ease;}
.sc-t{font-size:30px;font-weight:bold;color:#fff;margin-top:10px;text-shadow:0 2px 8px rgba(0,0,0,.2);}
.sc-s{font-size:14px;color:rgba(255,255,255,.9);margin-top:6px;}
@keyframes bounce{0%{transform:scale(.5)}60%{transform:scale(1.15)}100%{transform:scale(1)}}
#lang-ov{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.4);align-items:center;justify-content:center;}
#lang-ov.open{display:flex;}
#lang-modal{background:#fff;border-radius:20px;padding:22px 18px;width:calc(100% - 40px);max-width:340px;box-shadow:var(--shadow);}
#lang-modal h3{text-align:center;font-size:16px;margin-bottom:4px;}
.modal-hint{font-size:11px;color:var(--gray);text-align:center;margin-bottom:14px;}
.lang-mini{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.lmb{background:var(--cream);border:2px solid var(--ol);border-radius:12px;padding:12px 8px;text-align:center;cursor:pointer;font-size:14px;font-weight:bold;transition:all .15s;}
.lmb:active,.lmb.sel{background:var(--orange);color:#fff;border-color:var(--orange);}
#lm-close{display:block;margin:12px auto 0;background:none;border:1.5px solid var(--gray);border-radius:12px;padding:10px 24px;font-size:13px;color:var(--gray);cursor:pointer;}

/* Stage3/4 */
.meter-row{display:flex;align-items:center;justify-content:center;gap:10px;margin:16px 0;}
.meter-btn{width:56px;height:56px;border-radius:50%;border:2.5px solid #ddd;background:#fff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.meter-btn:active{transform:scale(.93);background:var(--ol);}
.meter-track{flex:1;height:14px;border-radius:7px;background:#eee;overflow:hidden;max-width:180px;}
.meter-fill{height:100%;border-radius:7px;background:linear-gradient(90deg,#4FC3F7,#FF7A2F);transition:width .2s;}
.meter-val{font-size:20px;font-weight:bold;color:var(--od);min-width:28px;text-align:center;}
#head-canvas{display:block;margin:12px auto;cursor:crosshair;border-radius:50%;box-shadow:var(--shadow);}
.timer-ring-wrap{position:relative;width:160px;height:160px;margin:0 auto;}
.timer-ring-wrap svg{transform:rotate(-90deg);}
.timer-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.timer-min{font-size:36px;font-weight:bold;color:var(--od);}
.timer-lbl{font-size:11px;color:var(--gray);}
.timer-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:12px 0;}
.timer-ctrl{background:#fff;border:2px solid var(--ol);border-radius:12px;padding:10px 14px;font-size:14px;font-weight:bold;cursor:pointer;color:var(--od);transition:all .15s;}
.timer-ctrl:active{background:var(--ol);}
.timer-ctrl.running{background:var(--red);color:#fff;border-color:var(--red);}
.save-card{background:#fff;border-radius:16px;padding:18px;box-shadow:var(--shadow);margin-bottom:12px;}
.save-title{font-size:16px;font-weight:bold;color:var(--text);margin-bottom:12px;text-align:center;}
.save-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}

/* Stage5/6 */
.care-card{background:#fff;border-radius:14px;padding:14px 16px;box-shadow:var(--shadow);margin-bottom:10px;display:flex;align-items:center;gap:12px;}
.care-ico{font-size:28px;flex-shrink:0;}
.care-txt{font-size:14px;line-height:1.5;}
.care-ja{font-size:11px;color:var(--gray);}
.notip-box{background:linear-gradient(135deg,#fff8e0,#fff3cc);border:2px solid #f0c040;border-radius:16px;padding:18px;text-align:center;margin-bottom:14px;}
.notip-main{font-size:18px;font-weight:bold;color:#8a6000;line-height:1.5;}
.notip-ja{font-size:12px;color:#a07000;margin-top:4px;}
.payment-big{font-size:58px;font-weight:bold;color:var(--od);text-align:center;padding:10px 0 4px;}
.pay-icons{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:10px 0;}
.pay-icon{background:#f5f5f5;border-radius:10px;padding:8px 12px;font-size:13px;font-weight:bold;color:#444;}
.qr-box{background:#fff;border-radius:14px;padding:20px;text-align:center;box-shadow:var(--shadow);margin-bottom:14px;}
.qr-label{font-size:14px;color:var(--gray);margin-bottom:10px;}
.qr-code{width:120px;height:120px;background:#f0f0f0;border-radius:10px;margin:0 auto;display:flex;align-items:center;justify-content:center;font-size:11px;color:#aaa;}
.complete-wrap{text-align:center;padding:48px 24px;}
.complete-emoji{font-size:80px;animation:bounce .5s ease;}
.complete-title{font-size:32px;font-weight:bold;color:var(--orange);margin:16px 0 8px;}
.complete-sub{font-size:16px;color:#666;line-height:2;}
</style>
</head>
<body>

<div id="header">
  <div id="progress-bar">
    <div class="dot" id="d0" onclick="dotTap(0)"></div>
    <div class="dot" id="d1" onclick="dotTap(1)"></div>
    <div class="dot" id="d2" onclick="dotTap(2)"></div>
    <div class="dot" id="d3" onclick="dotTap(3)"></div>
    <div class="dot" id="d4" onclick="dotTap(4)"></div>
    <div class="dot" id="d5" onclick="dotTap(5)"></div>
    <div class="dot" id="d6" onclick="dotTap(6)"></div>
  </div>
  <div id="stage-label">Salon Quest</div>
  <div id="header-nav">
    <button class="nav-btn" id="back-btn" onclick="goBack()">← Back<br><span style="font-size:10px;color:var(--gray)">戻る</span></button>
    <span style="font-size:18px;font-weight:bold;color:var(--orange)">✂️ Salon Quest</span>
    <button id="lang-btn" onclick="openLang()">🌐</button>
  </div>
</div>

<div id="main">
<section class="stage active" id="st0">
  <div style="font-size:52px;text-align:center;margin-top:8px;">✂️</div>
  <h1>Salon Quest</h1>
  <div class="lang-grid">
    <div class="lang-card" onclick="selectLang('ja')"><span class="flag">🇯🇵</span><span class="lname">日本語</span><span class="lname-ja"></span></div>
    <div class="lang-card" onclick="selectLang('en')"><span class="flag">🇺🇸</span><span class="lname">English</span><span class="lname-ja">英語</span></div>
    <div class="lang-card" onclick="selectLang('zh')"><span class="flag">🇨🇳</span><span class="lname">中文</span><span class="lname-ja">中国語</span></div>
    <div class="lang-card" onclick="selectLang('ko')"><span class="flag">🇰🇷</span><span class="lname">한국어</span><span class="lname-ja">韓国語</span></div>
  </div>
</section>
<section class="stage" id="st1">
  <div class="stage-header"><span class="stage-icon">🏷️</span><span class="stage-num">STAGE 1 / 6</span><div class="stage-title" id="st1-title"></div></div>
  <div class="stage-body" id="st1-body"></div>
</section>
<section class="stage" id="st2">
  <div class="stage-header"><span class="stage-icon">📋</span><span class="stage-num">STAGE 2 / 6</span><div class="stage-title" id="st2-title"></div><div class="ss-bar" id="ss-bar"></div></div>
  <div class="stage-body" id="st2-body"></div>
</section>
<section class="stage" id="st3">
  <div class="stage-header"><span class="stage-icon">💧</span><span class="stage-num">STAGE 3 / 6</span><div class="stage-title" id="st3-title"></div></div>
  <div class="stage-body" id="st3-body"></div>
</section>
<section class="stage" id="st4">
  <div class="stage-header"><span class="stage-icon">✨</span><span class="stage-num">STAGE 4 / 6</span><div class="stage-title" id="st4-title"></div></div>
  <div class="stage-body" id="st4-body"></div>
</section>
<section class="stage" id="st5">
  <div class="stage-header"><span class="stage-icon">🪞</span><span class="stage-num">STAGE 5 / 6</span><div class="stage-title" id="st5-title"></div></div>
  <div class="stage-body" id="st5-body"></div>
</section>
<section class="stage" id="st6">
  <div class="stage-header"><span class="stage-icon">🏆</span><span class="stage-num">STAGE 6 / 6</span><div class="stage-title" id="st6-title"></div></div>
  <div class="stage-body" id="st6-body"></div>
</section>
</div>

<button id="sos-fab" onclick="openSOS()"><span class="fab-e">🆘</span><span class="fab-l">SOS/ヘルプ</span></button>
<div id="sos-ov" onclick="closeSOS()">
  <div id="sos-panel" onclick="event.stopPropagation()">
    <h3>🆘 SOS / ヘルプ</h3>
    <div class="sos-grid" id="sos-grid"></div>
    <button id="sos-close" onclick="closeSOS()">Close / 閉じる</button>
  </div>
</div>
<div id="sos-alert" onclick="closeAlert()">
  <span class="al-e" id="al-e"></span><div class="al-j" id="al-j"></div><div class="al-en" id="al-en"></div>
  <button id="sos-ok">✅ 確認しました<span style="font-size:12px;color:var(--gray);display:block;">OK / I understand</span></button>
</div>
<div id="sc">
  <span class="sc-e">✨</span><div class="sc-t">Stage Clear! ✨</div><div class="sc-s" id="sc-sub"></div>
</div>
<div id="lang-ov" onclick="closeLang()">
  <div id="lang-modal" onclick="event.stopPropagation()">
    <h3>🌐 言語 / Language</h3>
    <p class="modal-hint">変更しても回答内容は保持されます</p>
    <div class="lang-mini">
      <div class="lmb" id="lb-ja" onclick="changeLang('ja')">🇯🇵 日本語</div>
      <div class="lmb" id="lb-en" onclick="changeLang('en')">🇺🇸 English<br><span style="font-size:10px;font-weight:normal">英語</span></div>
      <div class="lmb" id="lb-zh" onclick="changeLang('zh')">🇨🇳 中文<br><span style="font-size:10px;font-weight:normal">中国語</span></div>
      <div class="lmb" id="lb-ko" onclick="changeLang('ko')">🇰🇷 한국어<br><span style="font-size:10px;font-weight:normal">韓国語</span></div>
    </div>
    <button id="lm-close" onclick="closeLang()">閉じる / Close</button>
  </div>
</div>

<script>
/* ============================================================
   STATE
============================================================ */
var S = {
  lang: 'en',
  stage: 0,
  sub: 0,
  st1step: 0,
  visit: { res: null, menu: [], bag: null },
  counsel: { hist: [], allergy: null, styleId: null, ng: [], len: null, min: null, price: null, agreed: false, at: null },

/* ============================================================
   i18n helpers
============================================================ */
function tC(k) { return D[k] ? (D[k][S.lang] || D[k]['en']) : k; }
function tJa(k) { return (!D[k] || S.lang === 'ja') ? '' : (D[k]['ja'] || ''); }
function tK(k) { if (S.lang === 'ja' || !D[k] || !D[k].kana) return ''; return D[k].kana[S.lang] || ''; }
function tri(k) {
  var c = tC(k), kn = tK(k), j = tJa(k);
  var h = '<span class="cl">' + c + '</span>';
  if (kn) h += '<span class="ck">（' + kn + '）</span>';
  if (j)  h += '<span class="cj">▶ ' + j + '</span>';
  return h;
}
function qL(k) {
  var c = tC(k), kn = tK(k), j = tJa(k);
  var h = '<div class="q-main">' + c + '</div>';
  if (kn) h += '<div class="q-kana">（' + kn + '）</div>';
  if (j)  h += '<div class="q-ja">▶ ' + j + '</div>';
  return h;
}
function isChemical() {
  var chemical = ['color', 'both', 'perm'];
  for (var i = 0; i < S.visit.menu.length; i++) { if (chemical.indexOf(S.visit.menu[i]) > -1) return true; }
  return false;
}

/* ============================================================
   SOS
============================================================ */
function buildSOS() {
  var lg = S.lang, h = '';
  for (var i = 0; i < sosData.length; i++) {
    var d = sosData[i];
    var cl = lg === 'ja' ? d.j : (d.c[lg] || d.c['en']);
    var ck = lg !== 'ja' ? (d.ck[lg] || '') : '';
    var jl = lg !== 'ja' ? '<div class="sos-j">▶ ' + d.j + '</div>' : '';
    h += '<div class="sos-item" onclick="trigSOS(\'' + d.id + '\')"><span class="sos-e">' + d.e + '</span>'
       + '<div class="sos-c">' + cl + '</div>'
       + (ck ? '<div class="sos-k">（' + ck + '）</div>' : '')
       + jl + '</div>';
  }
  document.getElementById('sos-grid').innerHTML = h;
}
function openSOS() { buildSOS(); document.getElementById('sos-ov').classList.add('open'); }
function closeSOS() { document.getElementById('sos-ov').classList.remove('open'); }
function trigSOS(id) {
  closeSOS();
  var d = null;
  for (var i = 0; i < sosData.length; i++) { if (sosData[i].id === id) { d = sosData[i]; break; } }
  if (!d) return;
  document.getElementById('al-e').textContent = d.e;
  document.getElementById('al-j').textContent = d.j;
  document.getElementById('al-en').textContent = (d.c['en'] || '') + (d.ck['en'] ? '（' + d.ck['en'] + '）' : '');
  document.getElementById('sos-alert').classList.add('open');
  S.sos.push({ type: id, at: new Date().toISOString() }); save();
}
function closeAlert() { document.getElementById('sos-alert').classList.remove('open'); }

function drawHead() {
  var c = document.getElementById('head-canvas'); if (!c) return;
  c.onclick = headTap;
  c.ontouchend = function(e){ e.preventDefault(); headTap(e); };
  var ctx = c.getContext('2d');
  ctx.clearRect(0, 0, 220, 220);
  ctx.beginPath(); ctx.arc(110, 100, 88, 0, Math.PI*2);
  ctx.fillStyle = '#FFF0E0'; ctx.fill();
  ctx.strokeStyle = '#E05A10'; ctx.lineWidth = 3; ctx.stroke();
  ctx.font = '28px serif'; ctx.textAlign = 'center';
  ctx.fillText('👁', 84, 100); ctx.fillText('👁', 136, 100);
  ctx.fillText('👃', 110, 122); ctx.fillText('👄', 110, 150);
  for (var i = 0; i < S.shampoo.itchy.length; i++) {
    var pt = S.shampoo.itchy[i];
    ctx.beginPath(); ctx.arc(pt.x, pt.y, 14, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,100,100,0.5)'; ctx.fill();
    ctx.font = '18px serif'; ctx.fillText('😖', pt.x, pt.y+7);
  }
}
function headTap(e) {
  var c = document.getElementById('head-canvas'); if (!c) return;
  var r = c.getBoundingClientRect();
  var x = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
  var y = (e.touches ? e.touches[0].clientY : e.clientY) - r.top;
  x = x * (220 / r.width); y = y * (220 / r.height);
  S.shampoo.itchy.push({ x: Math.round(x), y: Math.round(y) });
  save(); drawHead();
}

      if (left <= 0) { clearInterval(timerInterval); timerInterval = null; }
      if (S.stage === 4) st4_timer(document.getElementById('st4-body'));
    }, 10000);
  }

  var i = S.finish.retouch.indexOf(id);
  if (i > -1) S.finish.retouch.splice(i, 1); else S.finish.retouch.push(id);
  save(); st5_check(document.getElementById('st5-body'));
}
function st5next() { st5step++; renderSt5(); window.scrollTo(0, 0); }

/* ============================================================
   STAGE 6 お会計・お見送り
============================================================ */
var st6step = 0;
function renderSt6() {
  var b = document.getElementById('st6-body');
  if      (st6step === 0) st6_payment(b);
  else if (st6step === 1) st6_photo(b);
  else                    st6_review(b);
}
function st6_payment(b) {
  var p = S.counsel.price;
  var taxIncl = p ? Math.round(p*1.1) : null;
  b.innerHTML = '<div class="notip-box">'
    + '<div class="notip-main">' + tC('notip') + '</div>'
    + (S.lang !== 'ja' ? '<div class="notip-ja">▶ 日本ではチップは不要です</div>' : '')
    + '</div>'
    + '<div class="q-card">'
    + '<div style="font-size:13px;color:var(--od);text-align:center;font-weight:bold;">💴 ' + tC('q_payment') + (S.lang!=='ja'?' / お会計':'') + '</div>'
    + '<div class="payment-big">¥' + (taxIncl ? taxIncl.toLocaleString() : '—') + '</div>'
    + (p ? '<div style="text-align:center;font-size:12px;color:var(--gray);margin-bottom:8px;">¥' + p.toLocaleString() + ' + ' + tC('tax_label') + ' (10%)</div>' : '')
    + '<div class="pay-icons">'
    + ['💳 VISA','💳 Master','💳 JCB','📱 PayPay','📱 Alipay','📱 WeChat Pay'].map(function(x){ return '<div class="pay-icon">' + x + '</div>'; }).join('')
    + '</div></div>'
    + nxtBtn('st6next()');
}
function st6_photo(b) {
  b.innerHTML = '<div class="q-card" style="text-align:center;">'
    + '<div style="font-size:64px;margin-bottom:8px;">📸</div>'
    + qL('q_photo')
    + '<div class="choice-grid col2" style="margin-top:16px;">'
    + cBtn('😄', 'photo_yes', S.finish.photo===true,  'st6setPhoto(true)')
    + cBtn('🙏', 'photo_no',  S.finish.photo===false, 'st6setPhoto(false)')
    + '</div></div>' + nxtBtn('st6next()');
}
function st6_review(b) {
  b.innerHTML = '<div class="qr-box">'
    + '<div style="font-size:22px;margin-bottom:6px;">⭐⭐⭐⭐⭐</div>'
    + '<div class="qr-label">' + tC('review_lbl') + (S.lang!=='ja'?'<br><span style="font-size:11px;color:var(--gray)">▶ Googleクチコミで応援してね</span>':'') + '</div>'
    + '<div class="qr-code">📲 QR<br><span style="font-size:9px;">（店舗URLを設定）</span></div>'
    + '</div>'
    + '<button class="next-btn" style="background:var(--green);margin-bottom:20px;" onclick="showComplete()">'
    + '🎉 Quest Complete!<span class="btn-sub">クエスト完了！</span></button>';
}
function st6setPhoto(v) { S.finish.photo = v; save(); st6_photo(document.getElementById('st6-body')); }
function st6next() { st6step++; renderSt6(); window.scrollTo(0, 0); }

/* ============================================================
   HELPERS
============================================================ */
function cBtn(e, k, sel, act) {
  return '<div class="cbtn' + (sel ? ' sel' : '') + '" onclick="' + act + '">'
       + '<span class="ce">' + e + '</span>' + tri(k) + '</div>';
}
function nxtBtn(act) {
  var kn = tK('next'), j = S.lang !== 'ja' ? tJa('next') : '';
  return '<button class="next-btn" style="margin-bottom:20px;" onclick="' + act + '">'
       + tC('next')
       + (kn ? '<span class="btn-sub">（' + kn + '）</span>' : '')
       + (j  ? '<span class="btn-sub">▶ 次へ進む</span>' : '')
       + '</button>';
}

/* ============================================================
   NAVIGATION
============================================================ */
function dotTap(n) {
  if (n === S.stage) return;
  if (n === 0) {
    // Stage 0（言語選択）へ
    show(S.stage, false); show(0, true);
    S.stage = 0; save();
    document.getElementById('sos-fab').style.display = 'none';
    updateHeader(); return;
  }
  // SOSボタンを表示（Stage0以外）
  document.getElementById('sos-fab').style.display = 'flex';
  goTo(n);
}

function selectLang(lg) {
  S.lang = lg; save();
  show(0, false); show(1, true);
  S.stage = 1; S.st1step = 0; save();
  document.getElementById('sos-fab').style.display = 'flex';
  updateHeader(); renderSt1();
}

function goBack() {
  if (S.stage === 6 && st6step > 0) { st6step--; renderSt6(); window.scrollTo(0,0); return; }
  if (S.stage === 5 && st5step > 0) { st5step--; renderSt5(); window.scrollTo(0,0); return; }
  if (S.stage === 4 && st4step > 0) { st4step--; renderSt4(); window.scrollTo(0,0); return; }
  if (S.stage === 3 && st3step > 0) { st3step--; renderSt3(); window.scrollTo(0,0); return; }
  if (S.stage === 2 && S.sub === 0) { goTo(1); return; }
  if (S.stage === 2 && S.sub > 0) { S.sub--; save(); renderSt2(); window.scrollTo(0,0); return; }
  if (S.stage === 1 && S.st1step > 0) { S.st1step--; renderSt1(); return; }
  if (S.stage === 1) {
    show(1, false); show(0, true); S.stage = 0; save();
    document.getElementById('sos-fab').style.display = 'none';
    updateHeader(); return;
  }
  if (S.stage <= 0) return;
  goTo(S.stage - 1);
}

function nextStage() {
  var c = S.stage; if (c >= 6) { showComplete(); return; }
  clearAnim(c, function() { goTo(c + 1); });
}

function goTo(n) {
  show(S.stage, false); S.stage = n; save(); show(n, true);
  if (n === 1) { S.st1step = 0; renderSt1(); }
  if (n === 2) { S.sub = isChemical() ? 0 : 2; save(); renderSt2(); }
  if (n === 3) { st3step = 0; renderSt3(); }
  if (n === 4) { st4step = 0; renderSt4(); }
  if (n === 5) { st5step = 0; renderSt5(); }
  if (n === 6) { st6step = 0; renderSt6(); }
  updateHeader(); window.scrollTo(0, 0);
}

function show(n, on) {
  var el = document.getElementById('st' + n);
  if (el) el.classList[on ? 'add' : 'remove']('active');
}

function updateHeader() {
  var s = S.stage;
  for (var i = 0; i <= 6; i++) {
    var d = document.getElementById('d' + i);
    d.classList.remove('active', 'done');
    if (i === s) d.classList.add('active');
    else if (i < s) d.classList.add('done');
  }
  var lb = document.getElementById('stage-label');
  var bb = document.getElementById('back-btn');
  if (s === 0) { lb.textContent = 'Salon Quest'; bb.style.visibility = 'hidden'; }
  else {
    var k = 's' + s + '_title';
    lb.textContent = 'Stage ' + s + '/6  ' + tC(k) + (S.lang !== 'ja' ? ' (' + tJa(k) + ')' : '');
    bb.style.visibility = 'visible';
  }
  for (var st = 1; st <= 6; st++) {
    var el = document.getElementById('st' + st + '-title'); if (!el) continue;
    var tk = 's' + st + '_title';
    var kn = tK(tk), jt = tJa(tk);
    el.innerHTML = tC(tk)
      + (kn ? '<span class="ja-sub" style="color:var(--od);">（' + kn + '）</span>' : '')
      + (jt ? '<span class="ja-sub">▶ ' + jt + '</span>' : '');
  }
}

function clearAnim(n, cb) {
  var el = document.getElementById('sc');
  document.getElementById('sc-sub').textContent = n < 6
    ? 'Next: Stage ' + (n + 1) + ' ▶ ' + tC('s' + (n + 1) + '_title')
    : '🎉 Quest Complete!';
  el.classList.add('open');
  setTimeout(function() { el.classList.remove('open'); cb(); }, 900);
}
function showComplete() {
  var b = document.getElementById('st6-body');
  b.innerHTML = '<div class="complete-wrap">'
    + '<div class="complete-emoji">🎉</div>'
    + '<div class="complete-title">Quest Complete!</div>'
    + '<div class="complete-sub">'
    + tC('farewell') + '<br>'
    + (S.lang!=='ja' ? '<span style="font-size:13px;color:var(--gray)">▶ またのお越しをお待ちしています</span><br>' : '')
    + '</div>'
    + '<div style="font-size:36px;margin:20px 0;">✂️ 🎨 💆 🌟</div>'
    + '<button class="next-btn" style="background:var(--green);max-width:320px;margin:0 auto;" onclick="resetApp()">'
    + '🔄 New Customer<span class="btn-sub">新しいお客様</span></button>'
    + '</div>';
}
function resetApp() { localStorage.removeItem('SQ'); location.reload(); }

function openLang() {
  document.getElementById('lang-ov').classList.add('open');
  var langs = ['ja','en','zh','ko'];
  for (var i = 0; i < langs.length; i++) {
    document.getElementById('lb-' + langs[i]).classList.toggle('sel', langs[i] === S.lang);
  }
}
function closeLang() { document.getElementById('lang-ov').classList.remove('open'); }
function changeLang(lg) {
  S.lang = lg; save(); updateHeader();
  if (S.stage === 1) renderSt1();
  if (S.stage === 2) renderSt2();
  if (S.stage === 3) renderSt3();
  if (S.stage === 4) renderSt4();
  if (S.stage === 5) renderSt5();
  if (S.stage === 6) renderSt6();
  closeLang();
}

function save() { try { localStorage.setItem('SQ', JSON.stringify(S)); } catch(e) {} }
function load() {
  try {
    var d = localStorage.getItem('SQ');
    if (!d) return;
    S = JSON.parse(d);
    if (!S.treat.checks) S.treat.checks = {};
    for (var i = 0; i <= 6; i++) show(i, false);
    show(S.stage, true);
    if (S.stage > 0) document.getElementById('sos-fab').style.display = 'flex';
    if (S.stage === 1) renderSt1();
    if (S.stage === 2) renderSt2();
    if (S.stage === 3) renderSt3();
    if (S.stage === 4) renderSt4();
    if (S.stage === 5) renderSt5();
    if (S.stage === 6) renderSt6();
  } catch(e) {}
}

document.getElementById('sos-fab').style.display = 'none';
load();
updateHeader();
</script>
</body>
</html>
